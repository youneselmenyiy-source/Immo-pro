<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script type="text/javascript">
// Safety check - if supabase didn't load, show error

    document.getElementById('root').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;color:#E74C3C;">Erreur : impossible de charger Supabase. Vérifiez votre connexion internet.</div>';

<script type="text/javascript">
const { useState, useEffect, useCallback } = React;

/* ── SUPABASE CONFIG ── */
const SUPA_URL = 'https://ptprpnzxcnprzcuvhxks.supabase.co';
const SUPA_KEY = 'sb_publishable_j38Voy7ug-Gs33xxWvq_iA_fJBRVoQ-';
window._sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);
const sb = window._sb;

/* ── TYPE EMOJI MAP ── */
const TYPE_EMOJI = {'Appartement':'🏢','Maison':'🏡','Studio':'🏠','Garage':'🅿️','Local commercial':'🏪'};
const getInitials = name => name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);

/* ── GLOBAL STATE (loaded from Supabase) ── */
let PROPS=[], TENANTS=[], PAYMENTS=[], TICKETS=[], DOCS=[], MSGS=[], ASSURANCES=[];

/* ── DATA LOADER ── */
async function loadAllData() {
  const [props,tenants,payments,tickets,docs] = await Promise.all([
    sb.from('properties').select('*').order('created_at'),
    sb.from('tenants').select('*').order('created_at'),
    sb.from('payments').select('*').order('created_at'),
    sb.from('tickets').select('*').order('created_at'),
    sb.from('documents').select('*').order('created_at'),
  ]);
  // assurances table is optional - won't crash if not yet created
  const assurances = await sb.from('assurances').select('*').order('created_at').then(r=>r).catch(()=>({data:[]}));
  if(!assurances.data) assurances.data=[];

  PROPS = (props.data||[]).map(p=>({
    ...p,
    img: TYPE_EMOJI[p.type]||'🏠',
    features: p.features ? (Array.isArray(p.features)?p.features:p.features.split(',').map(f=>f.trim())) : [],
    tenantId: null,
  }));

  TENANTS = (tenants.data||[]).map(t=>({
    ...t,
    propId: t.property_id,
    statusBail: t.bail_status||'Actif',
    initials: getInitials(t.name),
    urgence: t.urgence_contact||'',
  }));

  // Link tenants to properties
  TENANTS.forEach(t=>{ const p=PROPS.find(p=>p.id===t.property_id); if(p) p.tenantId=t.id; });

  PAYMENTS = (payments.data||[]).map(p=>({
    ...p,
    tid: p.tenant_id,
    pid: p.property_id,
    date: p.payment_date,
    mode: p.payment_mode||p.mode||null,
  }));

  TICKETS = (tickets.data||[]).map(t=>({
    ...t,
    pid: t.property_id,
    tid: t.tenant_id,
    prio: t.priority||'normale',
    desc: t.description||'',
    log: t.log ? (Array.isArray(t.log)?t.log:JSON.parse(t.log)) : [{d:t.created_at?.split('T')[0]||'',m:'Ticket créé'}],
  }));

  DOCS = (docs.data||[]).map(d=>({
    ...d,
    pid: d.property_id,
    tid: d.tenant_id,
    date: d.uploaded_at||d.created_at?.split('T')[0]||'',
    size: d.size||'—',
  }));

  ASSURANCES = (assurances.data||[]).map(a=>({
    ...a,
    propId: a.property_id,
    tenantId: a.tenant_id||null,
    compagnie: a.compagnie||'',
    numContrat: a.num_contrat||'',
    contact: a.contact||'',
  }));

  MSGS = TENANTS.slice(0,3).map(t=>({
    id:t.id, tid:t.id, name:t.name, initials:t.initials,
    preview:'Aucun message pour l\'instant', time:'—', unread:0, conv:[],
  }));

  return true;
}

/* ── DB HELPERS ── */
const db = {
  addProperty: d => sb.from('properties').insert([d]).select(),
  updateProperty: (id,d) => sb.from('properties').update(d).eq('id',id).select(),
  deleteProperty: id => sb.from('properties').delete().eq('id',id),
  addTenant: d => sb.from('tenants').insert([d]).select(),
  deleteTenant: id => sb.from('tenants').delete().eq('id',id),
  addPayment: d => sb.from('payments').insert([d]).select(),
  updatePayment: (id,d) => sb.from('payments').update(d).eq('id',id).select(),
  addTicket: d => sb.from('tickets').insert([d]).select(),
  updateTicket: (id,d) => sb.from('tickets').update(d).eq('id',id).select(),
  addDoc: d => sb.from('documents').insert([d]).select(),
  addAssurance: d => sb.from('assurances').insert([d]).select(),
};

const eur = n => new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(n||0);
const propById = id => PROPS.find(p=>p.id===id);
const tenantById = id => TENANTS.find(t=>t.id===id);

/* ── AUTH GATE ── */
function AuthGate({onAuth}) {
  const [email,setEmail]=useState('');

function CalendarPage(){
  const [current,setCurrent]=useState(new Date(2025,2,1));

  const year=current.getFullYear();
  const month=current.getMonth();
  const monthNames=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const dayNames=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];

  const firstDay=new Date(year,month,1);
  const lastDay=new Date(year,month+1,0);
  const startDow=(firstDay.getDay()+6)%7;

  // Build events map
  const events={};
  const addEvent=(dateStr,ev)=>{if(!events[dateStr])events[dateStr]=[];events[dateStr].push(ev);};

  // Loyers (1st of each month)
  TENANTS.forEach(t=>{
    const p=propById(t.propId);

    const key=year+'-'+String(month+1).padStart(2,'0')+'-01';
    const pay=PAYMENTS.find(py=>py.tid===t.id&&py.month.includes(monthNames[month]));
    addEvent(key,{label:p.name.split(' ')[0]+' — Loyer',cls:'cal-event-loyer',retard:pay&&pay.status==='retard'});

            React.createElement('span',null,n.label),
            n.badge>0&&React.createElement('span',{className:'nav-badge'},n.badge)
          ))
        ))
      ),
      React.createElement('div',{className:'sidebar-user'},
        React.createElement('div',{className:'user-card'},
          React.createElement('div',{className:'avatar',style:{width:32,height:32,fontSize:11},onClick:()=>go('profil')},'✉'),
          React.createElement('div',{style:{flex:1,minWidth:0},onClick:()=>go('profil')},
            React.createElement('div',{style:{fontSize:11,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:'#202124'}},userEmail||'Chargement…'),
            React.createElement('div',{style:{fontSize:10,color:'#9AA0A6'}},'Propriétaire')
          ),
          React.createElement('span',{title:'Déconnexion',style:{fontSize:16,cursor:'pointer',color:'#BDC1C6',padding:'4px'},onClick:e=>{e.stopPropagation();signOut();}},'⏏')
        )
      )
    ),
    React.createElement('main',{className:'main'},
      React.createElement('header',{className:'topbar'},
        React.createElement('div',{className:'mob-toggle',onClick:()=>setOpen(!open)},'☰'),
        React.createElement('div',{className:'page-title'},label),
        React.createElement('div',{style:{display:'flex',alignItems:'center',gap:8}},
          React.createElement('div',{className:'search-box'},React.createElement('span',{style:{color:'#9AA0A6',marginRight:6}},'🔍'),React.createElement('input',{placeholder:'Rechercher…'})),
          React.createElement('div',{className:'icon-btn',onClick:()=>go('messagerie')},'💬',React.createElement('div',{className:'notif-dot'})),
          React.createElement('div',{className:'icon-btn'},'🔔',React.createElement('div',{className:'notif-dot'})),
          React.createElement('div',{className:'avatar',style:{width:34,height:34,fontSize:11,cursor:'pointer'},onClick:()=>go('profil')},'✉')
        )
      ),
      React.createElement('div',{className:'content'},pages[page]||pages.dashboard)
    ),
    open&&React.createElement('div',{style:{position:'fixed',inset:0,background:'rgba(0,0,0,.3)',zIndex:99},onClick:()=>setOpen(false)}),
    React.createElement('nav',{className:'mob-nav'},
      React.createElement('div',{className:'mob-nav-items'},
        MOB_NAV.map(n=>React.createElement('div',{key:n.key,className:'mob-nav-item'+(page===n.key?' active':''),onClick:()=>go(n.key)},
          React.createElement('div',{className:'ni'},n.icon),React.createElement('div',null,n.label)
        ))
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App,null));
</script>
</body>
